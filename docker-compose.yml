services:
  postgres:
    image: pgduckdb/pgduckdb:16-main
    restart: unless-stopped
    environment:
      POSTGRES_USER: oe
      POSTGRES_PASSWORD: oe
      POSTGRES_DB: openestimate
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./data/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oe -d openestimate"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Celery worker for the OE_TECH_SPEC_GLOBAL background-job runner
  # (RFC 34 §4 W0.1). Reads JobRun ids from Redis and dispatches to the
  # generic ``oe.dispatch_job`` task, which in turn looks up the
  # registered handler in ``app.core.job_runner``.
  worker:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      OE_CELERY_BROKER_URL: redis://redis:6379/1
      OE_CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_URL: postgresql+asyncpg://oe:oe@postgres:5432/openestimate
      DATABASE_SYNC_URL: postgresql://oe:oe@postgres:5432/openestimate
    command: ["celery", "-A", "app.core.jobs", "worker", "--loglevel=info"]

volumes:
  pg_data:
  minio_data:
  qdrant_data:
