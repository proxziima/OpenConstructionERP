name: Bug Report
description: Report a bug in OpenEstimate
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of OpenEstimate are you using?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the application is affected?
      options:
        - BOQ Editor
        - Cost Database
        - Projects
        - Schedule
        - Tendering
        - Validation
        - Reports / Export
        - Authentication / Users
        - AI Features
        - UI / Frontend
        - API / Backend
        - Docker / Deployment
        - CLI
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      options:
        - Docker (single image)
        - Docker Compose
        - pip install
        - Desktop app (Tauri)
        - Development (source)
        - Cloud (Railway/Render/DO)

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Python/Node versions, etc.
      placeholder: "Windows 11, Chrome 130, Python 3.12"
