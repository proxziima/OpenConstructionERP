# CLA Assistant — checks that contributors have signed the CLA
#
# Uses: https://github.com/contributor-assistant/github-action

name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-check:
    if: |
      (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA')
      || github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/openestimate/openestimate/blob/main/CLA.md"
          branch: "main"
          allowlist: "ArtemBoiko,dependabot[bot],github-actions[bot]"
          custom-notsigned-prcomment: |
            Thank you for your pull request! Before we can merge it, you need to sign our
            [Contributor License Agreement (CLA)](https://github.com/openestimate/openestimate/blob/main/CLA.md).

            To sign, please comment on this PR with:

            > I have read the CLA Document and I hereby sign the CLA

          custom-pr-sign-comment: "I have read the CLA Document and I hereby sign the CLA"
