# OpenConstructionERP Desktop, build and release.
#
# Triggered on version tag push (e.g., v6.7.0).
# Builds desktop installers for Windows, macOS, and Linux.
#
# Artifacts:
#   - Windows: .exe (NSIS installer)
#   - macOS: .dmg
#   - Linux: .AppImage, .deb

name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sidecar:
    name: Build Sidecar (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Build every OS even if one fails, so a single-platform break never
      # cancels the others and we still ship the installers that did build.
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        # The macOS arm64 runner OOMs the Vite/Rollup build with Node's
        # default heap (exit 134, "JavaScript heap out of memory"). Give it
        # a 6 GB old-space ceiling; harmless on the roomier Linux/Windows runners.
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Build sidecar with PyInstaller
        run: |
          pyinstaller desktop/pyinstaller.spec --distpath desktop/dist --workpath desktop/build --noconfirm

      - name: Copy sidecar binary
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          # onefile build: PyInstaller writes a single executable directly into
          # distpath, not a onedir subfolder.
          cp "desktop/dist/openestimate-server${{ matrix.ext }}" \
             "desktop/src-tauri/binaries/openestimate-server-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: desktop/src-tauri/binaries/

  build-tauri:
    name: Build Desktop (${{ matrix.os }})
    needs: build-sidecar
    runs-on: ${{ matrix.os }}
    strategy:
      # Build every OS even if one fails, so a single-platform break never
      # cancels the others and we still ship the installers that did build.
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        # The macOS arm64 runner OOMs the Vite/Rollup build with Node's
        # default heap (exit 134, "JavaScript heap out of memory"). Give it
        # a 6 GB old-space ceiling; harmless on the roomier Linux/Windows runners.
        env:
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: desktop/src-tauri/binaries/

      - name: Make sidecar executable
        if: runner.os != 'Windows'
        run: chmod +x desktop/src-tauri/binaries/*

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "OpenConstructionERP ${{ github.ref_name }}"
          releaseBody: |
            ## OpenConstructionERP ${{ github.ref_name }}

            A real native desktop app. No Python, no pip, no Docker, and no database to set up. Download one file, run it, and you are ready.

            ### Download

            | Platform | File | Notes |
            | --- | --- | --- |
            | Windows | `.exe` installer, 64-bit | WebView2 is fetched automatically if it is missing |
            | macOS | `.dmg`, Apple Silicon | Drag the app to Applications. macOS 10.15 or later |
            | Linux | `.deb` or `.AppImage`, 64-bit | `.deb` for Debian and Ubuntu, `.AppImage` runs anywhere |

            The files are attached below under Assets. You can also always get the newest build at https://openconstructionerp.com/download which detects your operating system for you.

            ### Prefer the command line?

            pip (needs Python 3.12 or later):

            ```
            pip install --upgrade openconstructionerp
            openconstructionerp
            ```

            Docker:

            ```
            docker run -d -p 8080:8080 -v oe_data:/data ghcr.io/datadrivenconstruction/openconstructionerp:latest
            ```

            ### Good to know

            The first launch takes 40 to 90 seconds because the app sets up its local database the first time. A loading screen explains the wait, and every launch after that is fast. All your data stays on your own computer. The app is open source under AGPL-3.0. A demo account is ready to explore: demo@openconstructionerp.com / DemoPass1234!

            Docs: https://openconstructionerp.com/docs  .  Report an issue: https://github.com/datadrivenconstruction/OpenConstructionERP/issues
          releaseDraft: true
          prerelease: false
