# OpenEstimate Desktop — Build & Release
#
# Triggered on version tag push (e.g., v0.1.0).
# Builds desktop installers for Windows, macOS, and Linux.
#
# Artifacts:
#   - Windows: .exe (NSIS installer)
#   - macOS: .dmg
#   - Linux: .AppImage, .deb

name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-sidecar:
    name: Build Sidecar (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ext: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Python dependencies
        run: |
          cd backend
          pip install -e ".[dev]"

      - name: Build sidecar with PyInstaller
        run: |
          pyinstaller desktop/pyinstaller.spec --distpath desktop/dist --workpath desktop/build --noconfirm

      - name: Copy sidecar binary
        shell: bash
        run: |
          mkdir -p desktop/src-tauri/binaries
          cp "desktop/dist/openestimate-server/openestimate-server${{ matrix.ext }}" \
             "desktop/src-tauri/binaries/openestimate-server-${{ matrix.target }}${{ matrix.ext }}"

      - name: Upload sidecar artifact
        uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: desktop/src-tauri/binaries/

  build-tauri:
    name: Build Desktop (${{ matrix.os }})
    needs: build-sidecar
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Download sidecar
        uses: actions/download-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: desktop/src-tauri/binaries/

      - name: Make sidecar executable
        if: runner.os != 'Windows'
        run: chmod +x desktop/src-tauri/binaries/*

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: "OpenEstimate ${{ github.ref_name }}"
          releaseBody: |
            ## OpenEstimate ${{ github.ref_name }}

            Download the installer for your platform:
            - **Windows**: `.exe` (NSIS installer)
            - **macOS**: `.dmg`
            - **Linux**: `.AppImage` or `.deb`

            ### First run
            Launch the app → it opens your browser → register your first account.
            All data is stored locally in `~/.openestimate/`.
          releaseDraft: true
          prerelease: false
