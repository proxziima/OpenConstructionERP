<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" width="320" height="60" role="img" aria-label="India Construction Pack">
  <title>India Construction Pack</title>
  <desc>India Construction wordmark in saffron and India-green with the Ashoka Chakra emblem.</desc>

  <!-- Wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="700" letter-spacing="-0.3">
    <text x="6" y="28" font-size="22" fill="#FF9933">India</text>
    <text x="76" y="28" font-size="22" fill="#0F2C5F">Construction</text>
    <text x="6" y="50" font-size="11" fill="#5B6573" font-weight="500" letter-spacing="0.6">CPWD · IS CODES · DSR · NBC · RERA · GST</text>
  </g>

  <!-- Indian flag with Ashoka Chakra -->
  <g transform="translate(266, 10)">
    <!-- Flag stripes -->
    <rect x="0" y="0"  width="44" height="13" fill="#FF9933"/>
    <rect x="0" y="13" width="44" height="13" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
    <rect x="0" y="26" width="44" height="13" fill="#138808"/>

    <!-- Ashoka Chakra (24 spokes, simplified) -->
    <g transform="translate(22, 19.5)" stroke="#0F2C5F" stroke-width="0.6" fill="none">
      <circle r="5.5"/>
      <circle r="1.2" fill="#0F2C5F"/>
      <!-- 24 spokes via rotation -->
      <g>
        <line x1="0" y1="-5.2" x2="0" y2="5.2"/>
        <line x1="0" y1="-5.2" x2="0" y2="5.2" transform="rotate(15)"/>
        <line x1="0" y1="-5.2" x2="0" y2="5.2" transform="rotate(30)"/>
        <line x1="0" y1="-5.2" x2="0" y2="5.2" transform="rotate(45)"/>
        <line x1="0" y1="-5.2" x2="0" y2="5.2" transform="rotate(60)"/>
        <line x1="0" y1="-5.2" x2="0" y2="5.2" transform="rotate(75)"/>
        <line x1="0" y1="-5.2" x2="0" y2="5.2" transform="rotate(90)"/>
        <line x1="0" y1="-5.2" x2="0" y2="5.2" transform="rotate(105)"/>
        <line x1="0" y1="-5.2" x2="0" y2="5.2" transform="rotate(120)"/>
        <line x1="0" y1="-5.2" x2="0" y2="5.2" transform="rotate(135)"/>
        <line x1="0" y1="-5.2" x2="0" y2="5.2" transform="rotate(150)"/>
        <line x1="0" y1="-5.2" x2="0" y2="5.2" transform="rotate(165)"/>
      </g>
    </g>
  </g>
</svg>
