<?xml version="1.0" encoding="UTF-8"?>
<!--
  Saudi Vision 2030 Pack — bilingual wordmark.
  Arabic primary (RTL), English secondary. No mirroring needed: the
  emblem (green palm-fronds-on-shield mark) sits on the right edge so
  it sits visually next to the partner co-brand chip in both LTR
  (Western tenants) and RTL (Arabic tenants) layouts. Text uses
  direction="rtl" on the Arabic <text> so font shaping / kashida is
  rendered correctly by the browser.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 60" width="320" height="60" role="img" aria-label="Saudi Vision 2030 Pack — حزمة رؤية المملكة العربية السعودية 2030">
  <title>Saudi Vision 2030 Pack</title>
  <desc>Bilingual wordmark in Saudi flag green (#006C35) — Arabic on top, English underneath, with an emblem mark on the right.</desc>

  <!-- Arabic primary line (RTL) -->
  <text x="270" y="26"
        direction="rtl"
        text-anchor="end"
        font-family="'Noto Naskh Arabic', 'Geeza Pro', 'Arabic Typesetting', 'Segoe UI', Tahoma, sans-serif"
        font-size="18"
        font-weight="700"
        fill="#006C35">حزمة رؤية 2030</text>

  <!-- English secondary line -->
  <text x="270" y="48"
        text-anchor="end"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif"
        font-size="13"
        font-weight="600"
        letter-spacing="0.2"
        fill="#006C35">Saudi Vision 2030 Pack</text>

  <!-- Emblem: rounded square with stylised "30" notch (avoids any
       text-based cue that would break under mirroring filters) -->
  <g transform="translate(286, 14)">
    <rect x="0" y="0" width="28" height="28" rx="6" fill="#006C35"/>
    <path d="M6 18 L10 14 L14 18 L18 14 L22 18" stroke="#FFFFFF" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="14" cy="9" r="2.4" fill="#FFFFFF"/>
  </g>
</svg>
