<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 64" role="img" aria-label="Doker">
  <title>Doker</title>
  <desc>Doker formwork logo: industrial blue wordmark with stylised formwork panel mark.</desc>
  <!-- Stylised formwork panel mark (modular frame with tie-rod) -->
  <g fill="none" stroke="#003D7A" stroke-width="3" stroke-linecap="square">
    <rect x="6" y="10" width="44" height="44" rx="2" />
    <line x1="6"  y1="32" x2="50" y2="32" />
    <line x1="28" y1="10" x2="28" y2="54" />
  </g>
  <!-- Accent tie-rod dot -->
  <circle cx="28" cy="32" r="3.5" fill="#F58220" />
  <!-- Wordmark -->
  <text x="62" y="46"
        font-family="Helvetica, Arial, sans-serif"
        font-size="40"
        font-weight="700"
        letter-spacing="-1"
        fill="#003D7A">Doker</text>
  <text x="64" y="60"
        font-family="Helvetica, Arial, sans-serif"
        font-size="9"
        font-weight="500"
        letter-spacing="2"
        fill="#003D7A"
        opacity="0.7">FORMWORK SYSTEMS</text>
</svg>
