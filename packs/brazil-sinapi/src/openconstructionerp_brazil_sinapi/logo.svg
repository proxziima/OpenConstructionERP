<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 56" width="320" height="56" role="img" aria-label="Brazil Construction Pack">
  <title>Brazil Construction Pack</title>
  <desc>Brazil Construction Pack wordmark. Green rectangle and yellow diamond reference the Brazilian flag; blue disc echoes the celestial sphere.</desc>
  <!-- Flag motif: green field, yellow diamond, blue disc -->
  <g>
    <rect x="2" y="6" width="44" height="44" rx="4" fill="#009C3B"/>
    <polygon points="24,12 42,28 24,44 6,28" fill="#FFDF00"/>
    <circle cx="24" cy="28" r="9" fill="#002776"/>
    <path d="M 16 28 Q 24 23 32 28" stroke="#FFFFFF" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="700" letter-spacing="-0.3">
    <text x="56" y="26" fill="#009C3B" font-size="18">Brazil Construction</text>
    <text x="56" y="46" fill="#002776" font-size="13" font-weight="600">Pack - SINAPI - NBR - RPS</text>
  </g>
</svg>
