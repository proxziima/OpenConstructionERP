# UK Construction Pack — first-login onboarding wizard.
# Streamed by /api/v1/partner-pack/onboarding-script and rendered by
# the OnboardingWizard React component in place of the default steps.

version: 1
locale: en-GB
title: "Welcome to OpenConstructionERP — UK Edition"
subtitle: "Five quick steps to align your workspace with UK practice (NRM, JCT, BCIS)."

steps:
  - id: company_profile
    title: "Company profile"
    body: "Tell us about your firm so reports and tender documents are correctly attributed."
    fields:
      - { key: company_name, label: "Company name", type: text, required: true }
      - { key: company_number, label: "Companies House number", type: text, required: false }
      - { key: vat_number, label: "VAT registration number", type: text, required: false }
      - { key: head_office_region, label: "Head-office region", type: select, options: ["London", "South East", "South West", "Midlands", "North West", "North East", "Yorkshire", "Wales", "Scotland", "Northern Ireland"], required: true }

  - id: measurement_standard
    title: "Measurement standard (RICS NRM)"
    body: "Choose which RICS New Rules of Measurement you typically work to. The BOQ editor will validate against this standard."
    fields:
      - { key: primary_nrm, label: "Primary standard", type: radio, options: ["NRM 1 — Order of cost estimating & cost planning", "NRM 2 — Detailed measurement for building works", "Both (choose per project)"], required: true, default: "Both (choose per project)" }
      - { key: enable_bcis_benchmarks, label: "Enable BCIS cost-per-m² benchmarks on the dashboard", type: checkbox, default: true }

  - id: contract_suite
    title: "Default contract suite"
    body: "Pre-select your usual JCT contract type. You can override on every project."
    fields:
      - { key: default_jct_contract, label: "Default JCT contract", type: select, options: ["JCT Standard Building Contract (SBC)", "JCT Intermediate Building Contract (IC)", "JCT Minor Works Building Contract (MW)", "JCT Design and Build Contract (DB)", "JCT Construction Management"], required: true, default: "JCT Standard Building Contract (SBC)" }
      - { key: include_cdm_2015, label: "Apply CDM 2015 health-and-safety document templates", type: checkbox, default: true }

  - id: cost_data
    title: "Cost data sources"
    body: "Confirm which UK cost regions and indices should be loaded into your cost database."
    fields:
      - { key: cwicr_regions, label: "CWICR regions to preload", type: multiselect, options: ["London", "South East", "Midlands", "North West", "Scotland"], default: ["London"], required: true }
      - { key: bcis_subscription, label: "I have an active BCIS subscription (enables live index pulls)", type: checkbox, default: false }

  - id: review
    title: "Review and finish"
    body: "We will create your first UK project workspace with NRM 1+2 validation, the JCT contract template you chose, and BCIS benchmarks on the dashboard. You can change everything later in Settings."
    action:
      label: "Create my UK workspace"
      apply:
        - set_default_currency: GBP
        - set_tax_template: uk_vat_20
        - enable_rule_packs: [nrm_1_cost_planning, nrm_2_detailed_measurement, jct_contract_clauses, bcis_benchmarks]
