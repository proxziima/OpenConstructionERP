<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" width="240" height="50" role="img" aria-label="US Construction Pack">
  <title>US Construction Pack</title>
  <desc>US Construction Pack wordmark in Old Glory blue with a red stripe accent and white star.</desc>
  <!-- Wordmark -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="22" letter-spacing="-0.3">
    <text x="6" y="32" fill="#0A3161">US Construction</text>
    <text x="178" y="32" fill="#B31942">Pack</text>
  </g>
  <!-- Flag emblem: blue canton + white star + 3 red stripes -->
  <g transform="translate(218 8)">
    <rect x="0" y="0" width="18" height="34" rx="2" fill="#0A3161"/>
    <!-- 5-point star centred at (9, 9) -->
    <polygon
      points="9,3.8 10.5,7.5 14.5,7.5 11.2,9.8 12.5,13.7 9,11.4 5.5,13.7 6.8,9.8 3.5,7.5 7.5,7.5"
      fill="#FFFFFF"/>
    <!-- Red stripes below the canton -->
    <rect x="0" y="18"  width="18" height="3" fill="#B31942"/>
    <rect x="0" y="24"  width="18" height="3" fill="#B31942"/>
    <rect x="0" y="30"  width="18" height="3" fill="#B31942"/>
  </g>
</svg>
