<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="US Construction Pack">
  <title>US Construction Pack</title>
  <defs>
    <linearGradient id="us_bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a3161"/>
      <stop offset="1" stop-color="#08254a"/>
    </linearGradient>
    <linearGradient id="us_sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".20"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="us_flag_clip">
      <rect x="11" y="15.5" width="42" height="33" rx="4"/>
    </clipPath>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="15" fill="url(#us_bg)"/>
  <rect x="2" y="2" width="60" height="30" rx="15" fill="url(#us_sheen)"/>
  <g clip-path="url(#us_flag_clip)">
    <!-- white field -->
    <rect x="11" y="15.5" width="42" height="33" fill="#ffffff"/>
    <!-- 7-stripe flag: red on stripes 1,3,5,7 -->
    <rect x="11" y="15.500" width="42" height="4.714" fill="#b31942"/>
    <rect x="11" y="24.929" width="42" height="4.714" fill="#b31942"/>
    <rect x="11" y="34.357" width="42" height="4.714" fill="#b31942"/>
    <rect x="11" y="43.786" width="42" height="4.714" fill="#b31942"/>
    <!-- blue canton over the top-left four stripes -->
    <rect x="11" y="15.5" width="18.5" height="18.857" fill="#0a3161"/>
    <!-- star field: staggered white dots -->
    <g fill="#ffffff">
      <circle cx="15.2" cy="19.6" r="1.25"/>
      <circle cx="20.25" cy="19.6" r="1.25"/>
      <circle cx="25.3" cy="19.6" r="1.25"/>
      <circle cx="17.7" cy="24.9" r="1.25"/>
      <circle cx="22.75" cy="24.9" r="1.25"/>
      <circle cx="27.8" cy="24.9" r="1.25"/>
      <circle cx="15.2" cy="30.2" r="1.25"/>
      <circle cx="20.25" cy="30.2" r="1.25"/>
      <circle cx="25.3" cy="30.2" r="1.25"/>
    </g>
  </g>
  <!-- crisp edge so the white field reads on light backgrounds -->
  <rect x="11.5" y="16" width="41" height="32" rx="3.6" fill="none" stroke="#ffffff" stroke-opacity=".35" stroke-width="1"/>
</svg>
