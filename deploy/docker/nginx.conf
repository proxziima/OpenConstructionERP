server {
    listen 80;
    server_name _;

    # Security headers.
    #
    # Content-Security-Policy is INTENTIONALLY NOT set here. The backend
    # middleware (backend/app/middleware/security_headers.py) is the single
    # source of truth — `pip install` users without nginx still get CSP, and
    # there's no risk of two CSP headers being intersected by the browser
    # into something stricter than either source intended.
    #
    # The remaining headers are safe to dual-emit: they all use identical
    # values backend-side, so `add_header` here just acts as a belt-and-
    # braces fallback for any response that bypasses the FastAPI middleware
    # (e.g. nginx-served static SPA assets). HSTS is left here because
    # HTTPS-termination happens at this layer.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /usr/share/nginx/html;
    index index.html;

    # Allow large uploads (PDF drawings, CAD files). The nginx default of 1M
    # rejects most takeoff/BIM payloads with a 413 before they reach FastAPI.
    client_max_body_size 100M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ES module workers (.mjs). nginx-alpine has no mime mapping for .mjs, so
    # without this it serves them as application/octet-stream and the browser
    # refuses to load the pdf.js module worker, leaving the PDF takeoff viewer
    # blank. A regex location is matched before the prefix locations below, so
    # this wins for every .mjs asset (including those under /assets/).
    location ~* \.mjs$ {
        default_type application/javascript;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket endpoints (live notifications + collaborative-lock presence).
    # These need the HTTP/1.1 Upgrade handshake and long-lived connections,
    # which the generic /api/ proxy below does not provide. The proxy_pass has
    # NO trailing URI so the original request path AND its ?token= query string
    # are passed through unchanged (the WS clients send the JWT as a query
    # param, not an Authorization header). Matched before /api/ because regex
    # locations take precedence over the prefix match.
    location ~ ^/api/v1/(notifications/ws|collaboration_locks/presence)/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
