server {
    listen 80;
    server_name _;

    # Security headers.
    #
    # Content-Security-Policy is INTENTIONALLY NOT set here. The backend
    # middleware (backend/app/middleware/security_headers.py) is the single
    # source of truth — `pip install` users without nginx still get CSP, and
    # there's no risk of two CSP headers being intersected by the browser
    # into something stricter than either source intended.
    #
    # The remaining headers are safe to dual-emit: they all use identical
    # values backend-side, so `add_header` here just acts as a belt-and-
    # braces fallback for any response that bypasses the FastAPI middleware
    # (e.g. nginx-served static SPA assets). HSTS is left here because
    # HTTPS-termination happens at this layer.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
